version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      midnight-sdk:
        patterns:
          - "@midnight-ntwrk/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-plugin-*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "autoprefixer"
          - "postcss"
